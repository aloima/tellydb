name: Building source code

on:
  release:
    types: [published]
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
    - uses: actions/checkout@v4

    - name: Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-14 gperf libjemalloc2 libjemalloc-dev libssl-dev libgmp-dev python3-pip python3-setuptools

    - name: Install meson & ninja via PIP
      run: |
        pip3 install --upgrade pip
        pip3 install meson ninja

    - name: Run Meson Setup
      run: CC=gcc-14 meson setup build --native-file meson/release.ini

    - name: Build
      run: meson compile -C build

    - name: Rename output file
      run: mv build/telly build/telly-linux-amd64

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      if: startsWith(github.ref, 'refs/tags/')
      with:
        name: telly-linux-amd64
        path: build/telly-linux-amd64

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 8

    steps:
    - uses: actions/checkout@v4

    - name: Dependencies
      run: brew install gperf jemalloc gmp openssl

    - name: Install meson & ninja via PIP
      run: |
        sudo python3 -m pip install --upgrade pip --ignore-installed --break-system-packages
        sudo python3 -m pip install meson ninja --break-system-packages

    - name: Run Meson Setup
      run: |
        export OPENSSL_ROOT="$(brew --prefix openssl 2>/dev/null || brew --prefix openssl@3 2>/dev/null || true)"
        export PKG_CONFIG_PATH="${OPENSSL_ROOT}/lib/pkgconfig:$(brew --prefix jemalloc)/lib/pkgconfig:$(brew --prefix gmp)/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
        meson setup build --native-file meson/release.ini

    - name: Build
      run: meson compile -C build

    - name: Rename output file
      if: startsWith(github.ref, 'refs/tags/')
      run: mv build/telly build/telly-macos-arm64

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      if: startsWith(github.ref, 'refs/tags/')
      with:
        name: telly-macos-arm64
        path: build/telly-macos-arm64

  on-release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        merge-multiple: true
        path: ./release-assets

    - name: Publish files
      uses: softprops/action-gh-release@v2
      with:
        files: ./release-assets/telly-*
